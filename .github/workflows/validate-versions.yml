name: Validate Version Consistency

on:
  pull_request:
  push:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Validate version consistency
        run: python .claude/scripts/validate_versions.py

      - name: Comment on PR if validation fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Version validation failed. Please ensure:\n- `version` in `pyproject.toml` matches\n- `__version__` in `src/**/__init__.py`\n\nRun: `python .claude/scripts/sync_versions.py`'
            })
